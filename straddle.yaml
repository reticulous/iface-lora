# tr-lora — SX126x LoRa transport for reticulous.
#
# Carries the RadioLib ESP-IDF HAL (esp_idf_hal.cpp/h). Owns DIO1 ISR;
# implements RNode on-air framing for ecosystem interop. Drives up to
# CONFIG_LORA_COUNT radios on one shared SPI bus, each registering with
# rnsd as lora/<slot>.
#
# Pins + per-radio type come from this component's own Kconfig (LORA_* /
# LORAn_*), resolved from the buildable's sdkconfig. The board sets them in
# its sdkconfig.defaults; staged-but-inert when CONFIG_LORA_COUNT=0.
schema_version: 1
name: reticulous/tr-lora
prefix: rns_lora
version: 0.1.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - reticulous/rns
optional_requires:
  # lora.cpp registers a Settings pane via lcdSetting* helpers,
  # gated on CONFIG_SPANGAP_LCD.
  - spangap/spangap-lcd
# Auto-init: folded into the generated spangapInitStraddles() dispatcher.
# loraInit() self-registers with rnsd via ITS; `requires: reticulous/rns` puts
# rnsd ahead of it in dependency-topo order, so its port surface is up first.
init:
  - call: loraInit
