# tr-lora — SX1262 LoRa transport for reticulous.
#
# Carries the RadioLib ESP-IDF HAL (esp_idf_hal.cpp/h). Owns DIO1 ISR;
# implements RNode on-air framing for ecosystem interop.
#
# Board pin map (BOARD_LORA_*) comes from the consuming buildable straddle's
# main/ dir (e.g., hw-tdeck's tdeck.h). The component's PRIVATE
# include path includes ${CMAKE_SOURCE_DIR}/main so consumers don't have
# to thread the pin defs through Kconfig or a function pointer table.
schema_version: 1
name: reticulous/tr-lora
prefix: rns_lora
version: 0.1.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - reticulous/rns
optional_requires:
  # lora.cpp registers a Settings pane via lcdSetting* helpers,
  # gated on CONFIG_SPANGAP_LCD.
  - spangap/spangap-lcd
