# iface-lora — LoRa interface for reticulous.
#
# Carries the RadioLib ESP-IDF HAL (esp_idf_hal.cpp/h). Owns the radio IRQ
# line; frames RNS packets with a self-contained 1-byte-header split format
# (≤2 LoRa frames per 500-byte packet). Drives up to CONFIG_LORA_COUNT radios
# on one shared SPI bus, each registering with rnsd as lora/<slot>.
#
# Pins + per-radio type come from this component's own Kconfig (LORA_* /
# LORAn_*), resolved from the buildable's sdkconfig. The board sets them in
# its sdkconfig.defaults; staged-but-inert when CONFIG_LORA_COUNT=0.
schema_version: 1
name: reticulous/iface-lora
prefix: rns_lora
version: 0.0.0
firmware: esp-idf
browser: browser
platforms: [idf]
requires:
  - reticulous/rns
# Boot-registered Service: LoraService::onInit() self-registers with rnsd via
# ITS; `requires: reticulous/rns` puts rnsd ahead of it in dependency-topo
# order, so its port surface is up first.
services:
  - { class: LoraService, header: lora.h }

# Browser-side UI registration (parallel to init: above) — auto-wired into
# the buildable SPA via straddles.gen.ts; no web-interface edit needed.
browser_register:
  - call: registerLora
    module: modules/lora

# Declarative settings: LCD pane + radio-0 storage defaults generated from this
# block. web: false — LoraPanel.vue keeps the web leaf (IFAC secret, descriptive
# option labels, status badges). Radio 0 only; radios 1.. seeded by the loop in
# lora.cpp. Frequency + TX power carry no default (region/antenna — user must pick).
settings:
  - menu:
      - { id: mesh, label: "Mesh Network", placement: 3 }
      - { id: interfaces, label: "RNS Interfaces", placement: 2 }
      - { id: lora, label: "LoRa" }
    web: false
    rows:
      - section: "LoRa"
      - switch: { label: "Enable", key: "s.lora.0.enable", default: 0 }
      - section: "Radio"
      # Frequency/bandwidth are stored in Hz but entered here in MHz/kHz. These
      # rows bind ephemeral display keys, not s.lora.0.*; lora.cpp mirrors the Hz
      # config to them and converts edits back (so any value works, not presets).
      # Bandwidth's s.lora.0.bandwidth default is seeded in lora.cpp, not here.
      - text: { label: "Frequency (MHz)", key: "lora.0.freq_mhz" }
      - text: { label: "Bandwidth (kHz)", key: "lora.0.bw_khz" }
      - dropdown:
          label: "Spreading"
          key: "s.lora.0.spreading_factor"
          default: 7
          options:
            - { v: 7,  l: "SF7" }
            - { v: 8,  l: "SF8" }
            - { v: 9,  l: "SF9" }
            - { v: 10, l: "SF10" }
            - { v: 11, l: "SF11" }
            - { v: 12, l: "SF12" }
      - dropdown:
          label: "Coding rate"
          key: "s.lora.0.coding_rate"
          default: 5
          options:
            - { v: 5, l: "4/5" }
            - { v: 6, l: "4/6" }
            - { v: 7, l: "4/7" }
            - { v: 8, l: "4/8" }
      - slider: { label: "TX power", key: "s.lora.0.tx_power", min: -9, max: 22 }
      - slider: { label: "Preamble", key: "s.lora.0.preamble", min: 6, max: 32, default: 12 }
      - text:   { label: "Sync word", key: "s.lora.0.sync_word", default: "0x42" }
      - dropdown:
          label: "Mode"
          key: "s.lora.0.mode"
          default: "gateway"
          options:
            - { v: "full",         l: "Full" }
            - { v: "gateway",      l: "Gateway" }
            - { v: "access_point", l: "Access point" }
            - { v: "roaming",      l: "Roaming" }
            - { v: "boundary",     l: "Boundary" }
      - section: "Status"
      - value: { label: "State", key: "lora.0.state" }
      - value: { label: "Chip", key: "lora.0.chip" }
      - value: { label: "Bitrate", key: "lora.0.bitrate_eff" }
      - value: { label: "RSSI", key: "lora.0.stats.rssi_last" }
